<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0e0e11"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b6fff"/>
      <stop offset="100%" style="stop-color:#5b3ff0"/>
    </linearGradient>
    <linearGradient id="check" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#d4c6ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="#6d5cff" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Glow behind checkbox -->
  <rect x="116" y="116" width="280" height="280" rx="56" fill="#6d5cff" opacity="0.15" filter="url(#glow)"/>

  <!-- Checkbox body -->
  <rect x="116" y="116" width="280" height="280" rx="56" fill="url(#accent)" filter="url(#shadow)"/>

  <!-- Inner highlight -->
  <rect x="116" y="116" width="280" height="140" rx="56" fill="#ffffff" opacity="0.07"/>

  <!-- Checkmark -->
  <polyline
    points="168,264 228,328 348,192"
    fill="none"
    stroke="url(#check)"
    stroke-width="44"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#shadow)"
  />
</svg>
