<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Tracker</title>
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<link rel="apple-touch-icon" href="/icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e11;
  --bg-card: #18181c;
  --bg-hover: #1f1f25;
  --bg-surface: #232329;
  --text: #e4e4e7;
  --text-dim: #8b8b96;
  --text-faint: #55555e;
  --border: #2a2a32;
  --accent: #6d5cff;
  --accent-dim: rgba(109,92,255,0.12);
  --urgent: #f04438;
  --urgent-bg: rgba(240,68,56,0.08);
  --radius: 10px;
  --font: 'DM Sans', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: var(--font); line-height: 1.5;
  min-height: 100vh; -webkit-font-smoothing: antialiased;
}
::selection { background: var(--accent); color: #fff; }
.container { max-width: 720px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
header {
  display: flex; align-items: center; justify-content: space-between;
  gap: 1rem; flex-wrap: wrap;
  margin-bottom: 2rem;
}
.header-left { flex: 1; min-width: 0; }
.header-left h1 {
  font-size: 1.65rem; font-weight: 600; letter-spacing: -0.02em;
  background: linear-gradient(135deg, #e4e4e7 0%, #8b8b96 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header-right { display: flex; align-items: center; }

/* === auth UI === */
.auth-login-btn {
  font-family: var(--mono); font-size: 0.72rem;
  padding: 7px 14px; border-radius: 20px;
  background: transparent; border: 1px solid var(--border);
  color: var(--text-dim); cursor: pointer; transition: all 0.2s;
}
.auth-login-btn:hover { border-color: var(--accent); color: var(--text); }
.auth-user {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 0.72rem;
  padding: 4px 6px 4px 4px; border-radius: 20px;
  background: var(--bg-card); border: 1px solid var(--border);
}
.auth-avatar {
  width: 24px; height: 24px; border-radius: 50%; object-fit: cover;
  background: var(--bg-surface);
}
.auth-avatar.fallback {
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--accent); color: #fff;
  font-weight: 600; font-size: 0.72rem; font-family: var(--font);
}
.auth-name { color: var(--text); padding: 0 4px; }
.auth-logout {
  background: none; border: none; color: var(--text-faint);
  cursor: pointer; font-family: var(--mono); font-size: 0.7rem;
  padding: 2px 8px; transition: color 0.15s;
}
.auth-logout:hover { color: var(--urgent); }
.modal-text {
  font-size: 0.85rem; color: var(--text-dim);
  margin-bottom: 1.25rem; line-height: 1.5;
}
/* === login/register modal === */
.auth-tabs {
  display: flex; gap: 4px; margin-bottom: 1.25rem;
  border-bottom: 1px solid var(--border);
}
.auth-tab {
  flex: 1; padding: 9px 8px; background: transparent; border: none;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  font-family: var(--mono); font-size: 0.78rem; color: var(--text-dim);
  cursor: pointer; transition: color 0.15s, border-color 0.15s;
}
.auth-tab:hover { color: var(--text); }
.auth-tab.active { color: var(--text); border-bottom-color: var(--accent); }
.auth-form label {
  font-size: 0.72rem; color: var(--text-dim);
  display: block; margin: 0 0 4px; font-family: var(--mono);
}
.auth-form input[type="text"],
.auth-form input[type="password"] {
  width: 100%; background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 14px; color: var(--text);
  font-family: var(--font); font-size: 0.88rem; outline: none;
  margin-bottom: 0.85rem; transition: border-color 0.15s;
}
.auth-form input[type="text"]:focus,
.auth-form input[type="password"]:focus { border-color: var(--accent); }
.auth-error {
  font-size: 0.78rem; color: var(--urgent);
  background: var(--urgent-bg);
  border: 1px solid rgba(240,68,56,0.25);
  border-radius: 6px;
  padding: 8px 10px; margin-bottom: 0.85rem;
  font-family: var(--font);
  animation: fadeSection 0.15s ease-out;
}
.sync-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: var(--mono); font-size: 0.6rem; padding: 2px 6px;
  border-radius: 10px; background: var(--accent-dim); color: #c4b5fd;
  margin-left: 6px;
}
.sync-badge.error { background: var(--urgent-bg); color: var(--urgent); }

/* === stats === */
.stats {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
  margin-bottom: 1.25rem;
}
.stat {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
}
.stat-label { font-size: 0.7rem; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.07em; font-family: var(--mono); }
.stat-val { font-size: 1.5rem; font-weight: 600; margin-top: 4px; }
.stat-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
.stat-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
.stat-scope { font-size: 0.6rem; color: var(--text-faint); margin-top: 6px; font-family: var(--mono); }

.toolbar {
  display: flex; gap: 8px; align-items: center;
  justify-content: flex-end; flex-wrap: wrap;
  margin-bottom: 0.6rem;
}
.toolbar-btn {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 0.7rem;
  padding: 5px 12px; border-radius: 20px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-dim); cursor: pointer; transition: all 0.2s;
}
.toolbar-btn:hover { border-color: var(--text-faint); color: var(--text); }
.toolbar-btn .tb-icon { font-size: 0.85rem; line-height: 1; }
.toolbar-btn.archive.active {
  background: var(--urgent-bg); border-color: rgba(240,68,56,0.4); color: var(--urgent);
}

.filters {
  display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
  margin-bottom: 1rem;
  position: sticky; top: 0; z-index: 10;
  background: var(--bg); padding: 0.75rem 0;
}
.filter-btn {
  font-family: var(--mono); font-size: 0.72rem; padding: 6px 14px;
  border-radius: 20px; border: 1px solid var(--border);
  background: transparent; color: var(--text-dim);
  cursor: pointer; transition: all 0.2s;
  display: inline-flex; align-items: center; gap: 6px;
}
.filter-btn:hover { border-color: var(--text-faint); color: var(--text); }
.filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: #c4b5fd; }
.filter-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.filter-btn.add-cat-btn { border-style: dashed; color: var(--text-faint); }
.filter-btn.add-cat-btn:hover { color: var(--text-dim); }

.filter-btn.cat-editing {
  border-style: dashed; cursor: default;
  animation: catBreathe 1.4s ease-in-out infinite;
}
@keyframes catBreathe {
  0%, 100% { border-color: var(--border); }
  50%      { border-color: var(--text-dim); }
}
.cat-name { cursor: text; padding: 1px 3px; border-radius: 4px; transition: background 0.15s; }
.cat-name:hover { background: var(--bg-surface); }
.cat-rename-input {
  background: var(--bg-surface); border: 1px solid var(--accent);
  border-radius: 4px; color: var(--text);
  font-family: inherit; font-size: inherit;
  outline: none; padding: 2px 6px; width: 7em; min-width: 4em;
}
.cat-del {
  background: none; border: none; color: var(--text-faint);
  cursor: pointer; padding: 0 4px; margin-left: 2px;
  font-size: 1rem; line-height: 1; transition: color 0.15s;
}
.cat-del:hover { color: var(--urgent); }
.cat-edit-toggle {
  font-family: var(--mono); font-size: 0.72rem; padding: 6px 12px;
  border-radius: 20px; border: 1px solid var(--border);
  background: transparent; color: var(--text-faint);
  cursor: pointer; transition: all 0.2s;
}
.cat-edit-toggle:hover { color: var(--text-dim); border-color: var(--text-faint); }
.cat-edit-toggle.active { color: #c4b5fd; border-color: var(--accent); background: var(--accent-dim); }

.add-bar {
  display: flex; gap: 8px; margin-bottom: 1.75rem; flex-wrap: wrap;
  align-items: stretch;
}
.add-bar input[type="text"], .add-bar select {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 14px;
  color: var(--text); font-family: var(--font); font-size: 0.85rem;
  outline: none; transition: border-color 0.2s;
}
.add-bar input[type="text"]:focus, .add-bar select:focus { border-color: var(--accent); }
.add-bar input[type="text"] { flex: 1; min-width: 180px; }
.add-bar input[type="text"]::placeholder { color: var(--text-faint); }
.add-bar select { min-width: 130px; cursor: pointer; }
.add-bar select option { background: var(--bg-card); }
.add-btn {
  background: var(--accent); border: none; border-radius: var(--radius);
  color: #fff; font-family: var(--mono); font-size: 0.78rem; font-weight: 500;
  padding: 10px 20px; cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.add-btn:hover { opacity: 0.85; }
.add-btn:active { transform: scale(0.97); }

.date-picker {
  position: relative; display: flex; align-items: center;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 14px;
  color: var(--text); font-family: var(--font); font-size: 0.85rem;
  cursor: pointer; transition: border-color 0.2s;
  min-width: 140px; max-width: 200px;
}
.date-picker:hover { border-color: var(--text-faint); }
.date-picker:focus-within { border-color: var(--accent); }
.date-picker .date-display {
  flex: 1; pointer-events: none;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.date-picker .date-display.empty { color: var(--text-faint); }
.date-picker .date-cal-icon {
  width: 14px; height: 14px; opacity: 0.5; flex-shrink: 0;
  margin-left: 6px; pointer-events: none;
}
.date-picker .date-native {
  position: absolute; inset: 0; width: 100%; height: 100%;
  opacity: 0; cursor: pointer; border: none; background: transparent;
  padding: 0; margin: 0; color-scheme: dark;
  font-family: inherit; font-size: inherit;
}
.date-picker .date-native::-webkit-calendar-picker-indicator {
  position: absolute; inset: 0; width: 100%; height: 100%;
  cursor: pointer; opacity: 0; color: transparent; background: transparent;
}

.month-group { margin-bottom: 2rem; }
.month-header {
  font-family: var(--mono); font-size: 0.7rem; font-weight: 500;
  color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.1em;
  padding: 0 4px 8px; border-bottom: 1px solid var(--border);
  margin-bottom: 8px; display: flex; justify-content: space-between;
}
.task {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 40px 12px 14px; border-radius: var(--radius);
  border: 1px solid transparent; cursor: pointer;
  transition: all 0.15s; margin-bottom: 2px; position: relative;
}
.task:hover { background: var(--bg-hover); }
.task.urgent { border-left: 3px solid var(--urgent); background: var(--urgent-bg); }
.task.done { opacity: 0.35; }
.task.done .task-text { text-decoration: line-through; text-decoration-color: var(--text-faint); }
.task.editing { background: var(--bg-hover); cursor: default; padding: 14px; }
.task.editing:hover { background: var(--bg-hover); }
.checkbox {
  width: 20px; height: 20px; border-radius: 5px;
  border: 1.5px solid var(--border); flex-shrink: 0; margin-top: 1px;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s;
}
.task.done .checkbox { background: var(--accent); border-color: var(--accent); }
.checkbox svg { opacity: 0; transition: opacity 0.15s; }
.task.done .checkbox svg { opacity: 1; }
.task-body { flex: 1; min-width: 0; }
.task-text { font-size: 0.88rem; color: var(--text); line-height: 1.45; }
.task-row { display: flex; align-items: center; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
.tag {
  font-family: var(--mono); font-size: 0.62rem; font-weight: 500;
  padding: 2px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.04em;
}
.tag-urgent { background: var(--urgent-bg); color: var(--urgent); border: 1px solid rgba(240,68,56,0.25); }
.deadline {
  font-family: var(--mono); font-size: 0.68rem; color: var(--text-faint);
  margin-left: auto; padding-left: 12px; white-space: nowrap; flex-shrink: 0;
}
.deadline.overdue-label {
  color: var(--urgent); font-weight: 500;
}
/* Overdue tasks stay in the main list with a subtle red left border. */
.task.overdue { border-left: 3px solid var(--urgent); }
/* If a task is both urgent and overdue, the urgent border already covers it,
   but the deadline text colour is overridden by .overdue-label above. */
.task-edit-trigger {
  position: absolute; top: 50%; right: 10px;
  transform: translateY(-50%);
  background: none; border: none; color: var(--text-faint);
  cursor: pointer; font-size: 0.95rem; opacity: 0.35;
  transition: opacity 0.15s, color 0.15s, background 0.15s;
  padding: 4px 6px; border-radius: 4px; line-height: 1;
}
.task:hover .task-edit-trigger { opacity: 0.7; }
.task-edit-trigger:hover { opacity: 1; color: var(--text); background: var(--bg-surface); }

.archive-section { margin-top: 2.25rem; animation: fadeSection 0.2s ease-out; }
@keyframes fadeSection {
  from { opacity: 0; transform: translateY(-3px); }
  to   { opacity: 1; transform: translateY(0); }
}
.archive-header {
  font-family: var(--mono); font-size: 0.7rem; font-weight: 500;
  color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.1em;
  padding: 0 4px 8px; border-bottom: 1px solid var(--border);
  margin-bottom: 8px; display: flex; justify-content: space-between;
}
.task.archived { opacity: 0.5; transition: opacity 0.15s; }
.task.archived:hover { opacity: 0.85; }

.task-edit-form {
  width: 100%; display: flex; flex-direction: column; gap: 10px;
  animation: editFadeIn 0.18s ease-out;
}
@keyframes editFadeIn {
  from { opacity: 0; transform: translateY(-3px); }
  to   { opacity: 1; transform: translateY(0); }
}
.edit-field {
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 10px; color: var(--text);
  font-family: var(--font); font-size: 0.85rem; outline: none;
  transition: border-color 0.15s;
}
.edit-field:focus { border-color: var(--accent); }
.edit-row { display: flex; gap: 8px; flex-wrap: wrap; }
.edit-row > .edit-field, .edit-row > .date-picker { flex: 1; min-width: 110px; max-width: none; }
select.edit-field { cursor: pointer; }
.task-edit-form .date-picker {
  background: var(--bg-surface); padding: 8px 10px; border-radius: 6px;
  border: 1px solid var(--border); font-size: 0.85rem; min-width: 110px;
}
.edit-urgent {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 0.74rem; color: var(--text-dim);
  cursor: pointer; user-select: none;
}
.edit-urgent input { width: 16px; height: 16px; accent-color: var(--urgent); cursor: pointer; }
.edit-actions { display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
.btn-edit-save, .btn-edit-delete, .btn-edit-archive, .btn-edit-unarchive {
  padding: 8px 18px; border-radius: 6px; font-family: var(--mono);
  font-size: 0.75rem; cursor: pointer; transition: all 0.15s; border: none;
  font-weight: 500;
}
.btn-edit-save { background: var(--accent); color: #fff; }
.btn-edit-save:hover { opacity: 0.85; }
.btn-edit-delete { background: transparent; color: var(--urgent); border: 1px solid rgba(240,68,56,0.35); }
.btn-edit-delete:hover { background: var(--urgent-bg); border-color: var(--urgent); }
.btn-edit-archive, .btn-edit-unarchive {
  background: transparent; color: var(--text-dim); border: 1px solid var(--border);
}
.btn-edit-archive:hover, .btn-edit-unarchive:hover {
  color: var(--text); border-color: var(--text-faint);
}

.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; backdrop-filter: blur(4px);
  animation: fadeSection 0.15s ease-out;
}
.modal {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 14px; padding: 1.5rem; width: 90%; max-width: 380px;
}
.modal h3 { font-size: 1rem; font-weight: 500; margin-bottom: 1rem; }
.modal label { font-size: 0.78rem; color: var(--text-dim); display: block; margin-bottom: 4px; font-family: var(--mono); }
.modal input[type="text"] {
  width: 100%; background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 14px; color: var(--text);
  font-family: var(--font); font-size: 0.88rem; outline: none;
  margin-bottom: 1rem;
}
.modal input[type="text"]:focus { border-color: var(--accent); }
.color-grid {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
  margin-bottom: 1.25rem;
}
.color-swatch {
  width: 100%; aspect-ratio: 1; border-radius: 8px; cursor: pointer;
  border: 2px solid transparent; transition: all 0.15s;
}
.color-swatch:hover { transform: scale(1.1); }
.color-swatch.selected { border-color: #fff; box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px currentColor; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.modal-btns button {
  padding: 8px 18px; border-radius: 8px; font-family: var(--mono);
  font-size: 0.78rem; cursor: pointer; transition: all 0.15s; border: none;
}
.modal-btns .cancel { background: var(--bg-surface); color: var(--text-dim); }
.modal-btns .cancel:hover { color: var(--text); }
.modal-btns .confirm { background: var(--accent); color: #fff; }
.modal-btns .confirm:hover { opacity: 0.85; }

.empty-state {
  text-align: center; padding: 3rem 0; color: var(--text-faint);
  font-family: var(--mono); font-size: 0.82rem;
}

@media (max-width: 600px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .container { padding: 1.25rem 1rem 3rem; }
  .header-left h1 { font-size: 1.35rem; }
  .add-bar { flex-direction: column; }
  .add-bar input[type="text"] { min-width: unset; }
  .add-bar .date-picker, .add-bar select { max-width: none; }
  .task { padding-right: 36px; }
}
@media (max-width: 380px) {
  .filter-btn, .cat-edit-toggle { font-size: 0.68rem; padding: 5px 10px; }
  .toolbar-btn { font-size: 0.66rem; padding: 4px 9px; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-left">
      <h1>Task Tracker</h1>
    </div>
    <div class="header-right" id="auth-section"></div>
  </header>
  <div class="stats" id="stats"></div>
  <div class="toolbar" id="toolbar"></div>
  <div class="filters" id="filters"></div>
  <div class="add-bar">
    <input type="text" id="newText" placeholder="Новая задача..." onkeydown="if(event.key==='Enter')addTask()">
    <div class="date-picker" id="newDeadlineWrap">
      <span class="date-display empty" id="newDeadlineDisp">Дедлайн</span>
      <svg class="date-cal-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <input type="date" class="date-native" id="newDeadlineNative" onchange="onAddDateChange()">
    </div>
    <select id="newTag" onmousedown="this.dataset.prev=this.value" onchange="onAddTagChange()"></select>
    <button class="add-btn" onclick="addTask()">+ Добавить</button>
  </div>
  <div id="tasks"></div>
  <div id="modal-root"></div>
</div>

<script>
// ============================================================
// FRONT-END NEVER TALKS TO SUPABASE DIRECTLY.
// All authenticated data flows through /api/* serverless functions.
// Guest mode uses localStorage and makes ZERO network calls.
// ============================================================

// ============================================================
// CONSTANTS
// ============================================================
const COLOR_PALETTE = [
  { id:'blue',   hex:'#2e90fa', bg:'rgba(46,144,250,0.1)',  border:'rgba(46,144,250,0.25)' },
  { id:'green',  hex:'#12b76a', bg:'rgba(18,183,106,0.1)',  border:'rgba(18,183,106,0.25)' },
  { id:'amber',  hex:'#f79009', bg:'rgba(247,144,9,0.1)',   border:'rgba(247,144,9,0.25)' },
  { id:'purple', hex:'#a78bfa', bg:'rgba(167,139,250,0.1)', border:'rgba(167,139,250,0.25)' },
  { id:'coral',  hex:'#f97066', bg:'rgba(249,112,102,0.1)', border:'rgba(249,112,102,0.25)' },
  { id:'teal',   hex:'#2dd4bf', bg:'rgba(45,212,191,0.1)',  border:'rgba(45,212,191,0.25)' },
  { id:'pink',   hex:'#ec4899', bg:'rgba(236,72,153,0.1)',  border:'rgba(236,72,153,0.25)' },
  { id:'lime',   hex:'#84cc16', bg:'rgba(132,204,22,0.1)',  border:'rgba(132,204,22,0.25)' },
  { id:'sky',    hex:'#38bdf8', bg:'rgba(56,189,248,0.1)',  border:'rgba(56,189,248,0.25)' },

];

// New users start with a clean slate. No seed tasks, no seed categories —
// the UI handles empty `customTasks` / `categories` gracefully.

const RU_MONTH_NAMES    = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const RU_MONTH_GENITIVE = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const NO_DATE_LABEL     = 'Без даты';
const NEW_CAT_SENTINEL  = '__new_cat__';

const LS_KEYS = {
  checked: 'mp_checked', tasks: 'mp_tasks', cats: 'mp_categories',
  display: 'mp_display_mode', showArchive: 'mp_show_archive',
  authUser: 'mp_auth_user', token: 'mp_token',
};

// ============================================================
// STORAGE — dual-mode async abstraction (localStorage | /api/*)
// UI never touches localStorage or the network directly. Guest
// mode is the default and works fully offline; "api" mode kicks
// in once /api/login or /api/register has returned a JWT.
// ============================================================
function readJSON(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    if (raw == null) return fallback;
    const v = JSON.parse(raw);
    return v == null ? fallback : v;
  } catch (e) { return fallback; }
}
function writeJSON(key, value) { localStorage.setItem(key, JSON.stringify(value)); }

class UnauthorizedError extends Error {
  constructor(msg) { super(msg || 'Unauthorized'); this.unauthorized = true; }
}

const Storage = {
  mode: 'local',  // 'local' | 'api'
  token: null,

  async _fetch(url, opts = {}) {
    const headers = Object.assign({}, opts.headers || {});
    if (this.token) headers['Authorization'] = 'Bearer ' + this.token;
    if (opts.body && typeof opts.body === 'string' && !headers['Content-Type']) {
      headers['Content-Type'] = 'application/json';
    }
    let res;
    try {
      res = await fetch(url, Object.assign({}, opts, { headers }));
    } catch (networkErr) {
      const e = new Error('Network error: ' + (networkErr.message || networkErr));
      e.networkError = true;
      throw e;
    }
    if (res.status === 401) throw new UnauthorizedError();
    if (!res.ok) {
      const text = await res.text().catch(() => '');
      throw new Error('HTTP ' + res.status + ' ' + url + ': ' + (text || 'request failed'));
    }
    return res;
  },

  // --- Bulk fetch (called by loadAllData) ---
  async loadEverything() {
    if (this.mode === 'api') {
      const [tRes, cRes] = await Promise.all([
        this._fetch('/api/tasks'),
        this._fetch('/api/categories'),
      ]);
      const taskRows = await tRes.json();
      const catRows  = await cRes.json();
      const tasks = (taskRows || []).map(r => ({
        id: r.id, text: r.text, tag: r.tag,
        deadline: r.deadline || '—',
        manualUrgent: !!r.urgent,
        archived: !!r.archived,
        custom: true,
      }));
      const checked = {};
      (taskRows || []).forEach(r => { if (r.done) checked[r.id] = true; });
      const categories = {};
      (catRows || []).forEach(r => { categories[r.key] = { label: r.label, colorId: r.color_id }; });
      return { tasks, checked, categories };
    }
    return {
      tasks: readJSON(LS_KEYS.tasks, []),
      checked: readJSON(LS_KEYS.checked, {}),
      categories: readJSON(LS_KEYS.cats, null),
    };
  },

  // --- Per-task ops ---
  async upsertTask(task, done) {
    if (this.mode === 'api') {
      const payload = {
        id: task.id,
        text: task.text, tag: task.tag,
        deadline: task.deadline || null,
        deadline_date: isoFromRussian(task.deadline) || null,
        month: monthOf(task.deadline),
        urgent: !!task.manualUrgent,
        done: !!done,
        archived: !!task.archived,
      };
      await this._fetch('/api/tasks', {
        method: 'POST',
        body: JSON.stringify(payload),
      });
    } else {
      writeJSON(LS_KEYS.tasks, customTasks);
      writeJSON(LS_KEYS.checked, checked);
    }
  },
  async deleteTaskById(id) {
    if (this.mode === 'api') {
      await this._fetch('/api/tasks?id=' + encodeURIComponent(id), { method: 'DELETE' });
    } else {
      writeJSON(LS_KEYS.tasks, customTasks);
      writeJSON(LS_KEYS.checked, checked);
    }
  },
  async setTaskDone(id, done) {
    if (this.mode === 'api') {
      await this._fetch('/api/tasks?id=' + encodeURIComponent(id), {
        method: 'PUT',
        body: JSON.stringify({ done: !!done }),
      });
    } else {
      writeJSON(LS_KEYS.checked, checked);
    }
  },
  async setTaskArchived(id, archived) {
    if (this.mode === 'api') {
      await this._fetch('/api/tasks?id=' + encodeURIComponent(id), {
        method: 'PUT',
        body: JSON.stringify({ archived: !!archived }),
      });
    } else {
      writeJSON(LS_KEYS.tasks, customTasks);
    }
  },

  // --- Per-category ops ---
  async upsertCategory(key, cat) {
    if (this.mode === 'api') {
      await this._fetch('/api/categories', {
        method: 'POST',
        body: JSON.stringify({ key, label: cat.label, color_id: cat.colorId }),
      });
    } else {
      writeJSON(LS_KEYS.cats, categories);
    }
  },
  async deleteCategoryByKey(key) {
    if (this.mode === 'api') {
      await this._fetch('/api/categories?key=' + encodeURIComponent(key), { method: 'DELETE' });
    } else {
      writeJSON(LS_KEYS.cats, categories);
      writeJSON(LS_KEYS.tasks, customTasks);
      writeJSON(LS_KEYS.checked, checked);
    }
  },

  // --- Bulk insert (used by migration) ---
  async bulkInsertTasks(rows) {
    if (this.mode !== 'api') return;
    if (!rows.length) return;
    await this._fetch('/api/tasks', { method: 'POST', body: JSON.stringify(rows) });
  },
  async bulkInsertCategories(rows) {
    if (this.mode !== 'api') return;
    if (!rows.length) return;
    await this._fetch('/api/categories', { method: 'POST', body: JSON.stringify(rows) });
  },

  // --- Local-only inspection (used by the migration prompt) ---
  _getLocalTasks() { return readJSON(LS_KEYS.tasks, []); },

  // --- Device preferences (always localStorage) ---
  async getDisplayMode()       { return readJSON(LS_KEYS.display, 'date'); },
  async saveDisplayMode(v)     { writeJSON(LS_KEYS.display, v); },
  async getShowArchive()       { return readJSON(LS_KEYS.showArchive, false); },
  async saveShowArchive(v)     { writeJSON(LS_KEYS.showArchive, v); },
};

// ============================================================
// STATE
// ============================================================
let checked = {};
let customTasks = [];
let categories = {};
let displayMode = 'date';
let showArchive = false;
let filter = 'all';
let editingTaskId = null;
let categoryEditMode = false;
let editingCategoryKey = null;
let catModalSuccessCb = null;
let currentUser = null;     // { id, username } when authenticated, else null
let syncErrorMessage = '';  // shows in header if sync to /api/* fails

// ============================================================
// LOAD & SAVE (via Storage)
// ============================================================
async function loadAllData() {
  let state;
  try {
    state = await Storage.loadEverything();
    syncErrorMessage = '';
  } catch (e) {
    console.error('loadEverything failed:', e);
    syncErrorMessage = 'Ошибка синхронизации';
    if (Storage.mode === 'api') {
      if (e && e.unauthorized) {
        localStorage.removeItem(LS_KEYS.token);
        localStorage.removeItem(LS_KEYS.authUser);
      }
      Storage.mode  = 'local';
      Storage.token = null;
      currentUser = null;
      state = await Storage.loadEverything();
    } else {
      state = { tasks: [], checked: {}, categories: null };
    }
  }
  customTasks = state.tasks || [];
  checked     = state.checked || {};
  categories  = state.categories && typeof state.categories === 'object'
    ? state.categories
    : {};

  // Migrate legacy fields on stored custom tasks
  customTasks.forEach(t => {
    t.id = String(t.id);
    if (t.urgent !== undefined && t.manualUrgent === undefined) t.manualUrgent = t.urgent;
    delete t.urgent;
    delete t.month;
    if (typeof t.archived !== 'boolean') t.archived = false;
  });

  displayMode = await Storage.getDisplayMode();
  showArchive = await Storage.getShowArchive();
  if (displayMode !== 'date' && displayMode !== 'countdown') displayMode = 'date';
}

// ============================================================
// DATE PARSING & FORMATTING
// ============================================================
const RU_MONTH_PREFIXES = [
  ['январ', 1], ['феврал', 2], ['март',  3], ['апрел', 4],
  ['ма',    5], ['июн',    6], ['июл',   7], ['август',8],
  ['сентябр',9],['октябр',10], ['ноябр',11], ['декабр',12],
];

function parseRussianDate(s) {
  if (!s) return null;
  const str = String(s).toLowerCase().trim();
  // Try "DD месяц YYYY" first (explicit year — used whenever the date is
  // not in the current year, so a date-picker selection round-trips
  // without losing the year).
  let m = str.match(/^(\d{1,2})\s+([а-яё]+)\s+(\d{4})$/);
  if (m) {
    const day  = parseInt(m[1], 10);
    const year = parseInt(m[3], 10);
    const word = m[2];
    if (day < 1 || day > 31) return null;
    let month = null;
    for (const [prefix, num] of RU_MONTH_PREFIXES) {
      if (word.startsWith(prefix)) { month = num; break; }
    }
    if (!month) return null;
    return new Date(year, month - 1, day);
  }
  // Fall back to "DD месяц" — same-year shorthand. Year is inferred from
  // today; if the resulting date is far in the past, assume next year.
  m = str.match(/^(\d{1,2})\s+([а-яё]+)$/);
  if (!m) return null;
  const day = parseInt(m[1], 10);
  if (day < 1 || day > 31) return null;
  const word = m[2];
  let month = null;
  for (const [prefix, num] of RU_MONTH_PREFIXES) {
    if (word.startsWith(prefix)) { month = num; break; }
  }
  if (!month) return null;
  const today = new Date();
  let year = today.getFullYear();
  let date = new Date(year, month - 1, day);
  const diffDays = (today - date) / (1000 * 60 * 60 * 24);
  if (diffDays > 60) { year += 1; date = new Date(year, month - 1, day); }
  return date;
}

function daysUntil(date) {
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(date); d.setHours(0,0,0,0);
  return Math.round((d - today) / (1000 * 60 * 60 * 24));
}

function isAutoUrgent(deadline) {
  const d = parseRussianDate(deadline);
  if (!d) return false;
  return daysUntil(d) <= 7;
}

function pluralDays(n) {
  const abs = Math.abs(n); const m10 = abs % 10; const m100 = abs % 100;
  if (m10 === 1 && m100 !== 11) return `${abs} день`;
  if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) return `${abs} дня`;
  return `${abs} дней`;
}

function formatDeadline(deadline) {
  if (displayMode === 'date') return deadline;
  const d = parseRussianDate(deadline);
  if (!d) return deadline;
  const days = daysUntil(d);
  if (days === 0)  return 'сегодня';
  if (days === 1)  return 'завтра';
  if (days === -1) return 'просрочено на 1 день';
  if (days < 0)    return `просрочено на ${pluralDays(days)}`;
  return `через ${pluralDays(days)}`;
}

function russianFromIso(iso) {
  if (!iso) return '';
  const parts = iso.split('-');
  if (parts.length !== 3) return '';
  const [y, m, d] = parts.map(Number);
  if (!y || !m || !d || m < 1 || m > 12) return '';
  const base = `${d} ${RU_MONTH_GENITIVE[m - 1]}`;
  // Same-year dates use the short form. Any other year is encoded
  // explicitly so the year survives the round-trip through storage.
  const currentYear = new Date().getFullYear();
  return y === currentYear ? base : `${base} ${y}`;
}

function isoFromRussian(deadline) {
  const d = parseRussianDate(deadline);
  if (!d) return '';
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function monthOf(deadline) {
  const d = parseRussianDate(deadline);
  if (!d) return NO_DATE_LABEL;
  return `${RU_MONTH_NAMES[d.getMonth()]} ${d.getFullYear()}`;
}

function monthSortKey(label) {
  if (label === NO_DATE_LABEL) return Number.MAX_SAFE_INTEGER;
  const m = label.match(/^(\S+)\s+(\d{4})$/);
  if (!m) return Number.MAX_SAFE_INTEGER - 1;
  const idx = RU_MONTH_NAMES.indexOf(m[1]);
  if (idx < 0) return Number.MAX_SAFE_INTEGER - 1;
  return parseInt(m[2], 10) * 12 + idx;
}

function taskDateSortKey(t) {
  const d = parseRussianDate(t.deadline);
  return d ? d.getTime() : Number.MAX_SAFE_INTEGER;
}

// ============================================================
// TASK ASSEMBLY
// In Supabase mode there are no "default" tasks — everything is
// a real row. In local mode defaults merge with overrides + custom.
// ============================================================
function getColor(colorId) { return COLOR_PALETTE.find(c => c.id === colorId) || COLOR_PALETTE[0]; }
function catColor(tag)     { return getColor((categories[tag] || {}).colorId || 'blue'); }

function getAllEffectiveTasks() {
  return customTasks.map(t => ({
    id: t.id,
    text: t.text,
    deadline: t.deadline,
    tag: t.tag,
    manualUrgent: !!t.manualUrgent,
    archived: !!t.archived,
    custom: true,
  }));
}

// Archived flag is now a per-task property set manually by the user.
function isArchived(t) { return !!t.archived; }

// Overdue is purely visual now — overdue tasks stay in the active list
// but get a red deadline + subtle red left border.
function isOverdue(t) {
  if (checked[t.id]) return false;
  if (t.archived) return false;
  const d = parseRussianDate(t.deadline);
  if (!d) return false;
  return daysUntil(d) < 0;
}

function generateTaskId() {
  return (window.crypto && crypto.randomUUID)
    ? crypto.randomUUID()
    : ('t_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10));
}

// ============================================================
// TASK ACTIONS (all async — write to storage then await; render
// is called optimistically before the network write completes).
// ============================================================
async function toggle(id) {
  if (editingTaskId === id) return;
  checked[id] = !checked[id];
  render();
  try { await Storage.setTaskDone(id, !!checked[id]); markSync(true); }
  catch (e) { console.error(e); markSync(false); }
}

function setFilter(f) {
  if (categoryEditMode) return;
  filter = f; render();
}

async function addTask() {
  const textEl     = document.getElementById('newText');
  const nativeDate = document.getElementById('newDeadlineNative');
  const tagEl      = document.getElementById('newTag');
  const text = textEl.value.trim();
  if (!text) { textEl.focus(); return; }
  let tagVal = tagEl.value;
  if (!tagVal || tagVal === NEW_CAT_SENTINEL) {
    if (!Object.keys(categories).length) { alert('Сначала создайте категорию'); return; }
    tagVal = Object.keys(categories)[0];
  }
  const deadline = russianFromIso(nativeDate.value) || '—';
  const newTask = {
    id: generateTaskId(), text, tag: tagVal, deadline,
    manualUrgent: false, archived: false, custom: true,
  };
  customTasks.push(newTask);
  // Reset form
  textEl.value = ''; nativeDate.value = '';
  const disp = document.getElementById('newDeadlineDisp');
  disp.textContent = 'Дедлайн'; disp.classList.add('empty');
  render();
  try { await Storage.upsertTask(newTask, false); markSync(true); }
  catch (e) { console.error(e); markSync(false); }
}

function startTaskEdit(id) {
  editingTaskId = id; render();
  const el = document.getElementById('te-text-' + id);
  if (el) { el.focus(); el.select(); }
}

function cancelTaskEdit() {
  if (editingTaskId == null) return;
  editingTaskId = null; render();
}

async function saveTaskEdit(id) {
  const textEl     = document.getElementById('te-text-' + id);
  const wrap       = document.getElementById('te-deadline-wrap-' + id);
  const nativeDate = document.getElementById('te-deadline-native-' + id);
  const tagEl      = document.getElementById('te-tag-' + id);
  const urgentEl   = document.getElementById('te-urgent-' + id);
  if (!textEl || !nativeDate || !tagEl || !urgentEl) return;
  const text = textEl.value.trim();
  if (!text) { textEl.focus(); return; }
  const original = (wrap && wrap.dataset.original) || '';
  const deadline = nativeDate.value
    ? (russianFromIso(nativeDate.value) || '—')
    : (original || '—');
  let tag = tagEl.value;
  if (!tag || tag === NEW_CAT_SENTINEL) {
    const firstKey = Object.keys(categories)[0];
    if (!firstKey) { alert('Сначала создайте категорию'); return; }
    tag = firstKey;
  }
  const manualUrgent = urgentEl.checked;

  const customIdx = customTasks.findIndex(t => t.id === id);
  if (customIdx >= 0) {
    customTasks[customIdx] = {
      ...customTasks[customIdx], text, deadline, tag, manualUrgent,
    };
    editingTaskId = null; render();
    try { await Storage.upsertTask(customTasks[customIdx], !!checked[id]); markSync(true); }
    catch (e) { console.error(e); markSync(false); }
  } else {
    editingTaskId = null; render();
  }
}

async function archiveTask(id) {
  const idx = customTasks.findIndex(t => t.id === id);
  if (idx < 0) return;
  customTasks[idx].archived = true;
  editingTaskId = null;
  render();
  try { await Storage.setTaskArchived(id, true); markSync(true); }
  catch (e) { console.error(e); markSync(false); }
}

async function unarchiveTask(id) {
  const idx = customTasks.findIndex(t => t.id === id);
  if (idx < 0) return;
  customTasks[idx].archived = false;
  editingTaskId = null;
  render();
  try { await Storage.setTaskArchived(id, false); markSync(true); }
  catch (e) { console.error(e); markSync(false); }
}

function confirmDeleteTask(id) {
  const t = getAllEffectiveTasks().find(x => x.id === id);
  if (!t) return;
  if (!confirm(`Удалить задачу «${t.text}»?`)) return;
  deleteTask(id);
}

async function deleteTask(id) {
  const customIdx = customTasks.findIndex(t => t.id === id);
  if (customIdx >= 0) customTasks.splice(customIdx, 1);
  delete checked[id];
  editingTaskId = null;
  render();
  try { await Storage.deleteTaskById(id); markSync(true); }
  catch (e) { console.error(e); markSync(false); }
}

// ============================================================
// CATEGORY ACTIONS
// ============================================================
function toggleCategoryEditMode() {
  categoryEditMode = !categoryEditMode;
  editingCategoryKey = null;
  if (categoryEditMode) editingTaskId = null;
  render();
}

function startCatRename(key) {
  editingCategoryKey = key; render();
  const el = document.getElementById('cat-rename-' + key);
  if (el) { el.focus(); el.select(); }
}

async function saveCatRename(key) {
  const el = document.getElementById('cat-rename-' + key);
  if (!el) return;
  const val = el.value.trim();
  if (val && categories[key]) {
    categories[key].label = val;
    try { await Storage.upsertCategory(key, categories[key]); markSync(true); }
    catch (e) { console.error(e); markSync(false); }
  }
  editingCategoryKey = null; render();
}

function cancelCatRename() { editingCategoryKey = null; render(); }

function confirmCatDelete(key) {
  const cat = categories[key];
  if (!cat) return;
  if (!confirm(`Удалить категорию «${cat.label}»? Все задачи в ней тоже будут удалены.`)) return;
  deleteCategory(key);
}

async function deleteCategory(key) {
  customTasks = customTasks.filter(t => {
    if (t.tag === key) { delete checked[t.id]; return false; }
    return true;
  });
  delete categories[key];
  if (filter === key) filter = 'all';
  render();
  try { await Storage.deleteCategoryByKey(key); markSync(true); }
  catch (e) { console.error(e); markSync(false); }
}

// ============================================================
// CATEGORY MODAL — supports callback for inline-creation flows
// ============================================================
function showCatModal(onSuccess) {
  catModalSuccessCb = typeof onSuccess === 'function' ? onSuccess : null;
  window._selCatColor = COLOR_PALETTE[0].id;
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeCatModal()">
      <div class="modal">
        <h3>Новая категория</h3>
        <label>Название</label>
        <input type="text" id="catName" placeholder="Например: Работа" onkeydown="if(event.key==='Enter')confirmCat()">
        <label>Цвет</label>
        <div class="color-grid">
          ${COLOR_PALETTE.map(c => `
            <div class="color-swatch${window._selCatColor === c.id ? ' selected' : ''}"
                 style="background:${c.hex};color:${c.hex}"
                 onclick="window._selCatColor='${c.id}';document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));this.classList.add('selected')"></div>
          `).join('')}
        </div>
        <div class="modal-btns">
          <button class="cancel" onclick="closeCatModal()">Отмена</button>
          <button class="confirm" onclick="confirmCat()">Создать</button>
        </div>
      </div>
    </div>`;
  setTimeout(() => { const el = document.getElementById('catName'); if (el) el.focus(); }, 50);
}

function closeCatModal() {
  document.getElementById('modal-root').innerHTML = '';
  catModalSuccessCb = null;
}

async function confirmCat() {
  const nameEl = document.getElementById('catName');
  const name = nameEl ? nameEl.value.trim() : '';
  if (!name) { if (nameEl) nameEl.focus(); return; }
  const key = 'cat_' + Date.now();
  categories[key] = { label: name, colorId: window._selCatColor || 'blue' };
  document.getElementById('modal-root').innerHTML = '';
  try { await Storage.upsertCategory(key, categories[key]); markSync(true); }
  catch (e) { console.error(e); markSync(false); }
  const cb = catModalSuccessCb;
  catModalSuccessCb = null;
  if (cb) cb(key);
  else render();
}

// ============================================================
// INLINE "+ Новая категория" FROM TASK FORMS
// ============================================================
function onAddTagChange() {
  const sel = document.getElementById('newTag');
  if (sel.value !== NEW_CAT_SENTINEL) return;
  const prev = sel.dataset.prev && sel.dataset.prev !== NEW_CAT_SENTINEL
    ? sel.dataset.prev
    : (Object.keys(categories)[0] || '');
  sel.value = prev;
  showCatModal((newKey) => {
    render();
    const s = document.getElementById('newTag');
    if (s) s.value = newKey;
  });
}

function onEditTagChange(id) {
  const sel = document.getElementById('te-tag-' + id);
  if (!sel || sel.value !== NEW_CAT_SENTINEL) return;
  const prev = sel.dataset.prev && sel.dataset.prev !== NEW_CAT_SENTINEL
    ? sel.dataset.prev
    : (Object.keys(categories)[0] || '');
  sel.value = prev;
  showCatModal((newKey) => {
    const s = document.getElementById('te-tag-' + id);
    if (!s) return;
    const placeholder = s.querySelector('option[value="' + NEW_CAT_SENTINEL + '"]');
    const opt = document.createElement('option');
    opt.value = newKey;
    opt.textContent = categories[newKey].label;
    s.insertBefore(opt, placeholder);
    s.value = newKey;
    s.dataset.prev = newKey;
  });
}

// ============================================================
// DATE PICKER — change handlers
// ============================================================
function onAddDateChange() {
  const native = document.getElementById('newDeadlineNative');
  const disp   = document.getElementById('newDeadlineDisp');
  const ru = russianFromIso(native.value);
  if (ru) { disp.textContent = ru; disp.classList.remove('empty'); }
  else    { disp.textContent = 'Дедлайн'; disp.classList.add('empty'); }
}

function onEditDateChange(id) {
  const native = document.getElementById('te-deadline-native-' + id);
  const disp   = document.getElementById('te-deadline-disp-' + id);
  const wrap   = document.getElementById('te-deadline-wrap-' + id);
  const ru = russianFromIso(native.value);
  if (ru) { disp.textContent = ru; disp.classList.remove('empty'); return; }
  const original = (wrap && wrap.dataset.original) || '';
  if (original && original !== '—') {
    disp.textContent = original; disp.classList.remove('empty');
  } else {
    disp.textContent = 'Дедлайн'; disp.classList.add('empty');
  }
}

// ============================================================
// TOGGLES (archive, display mode)
// ============================================================
async function toggleArchive() {
  showArchive = !showArchive;
  await Storage.saveShowArchive(showArchive);
  render();
}
async function toggleDisplayMode() {
  displayMode = displayMode === 'date' ? 'countdown' : 'date';
  await Storage.saveDisplayMode(displayMode);
  render();
}


// ============================================================
// AUTH — username/password login + register
// ============================================================
let loginModalTab = 'login'; // 'login' | 'register'

function showLoginModal(tab) {
  loginModalTab = tab === 'register' ? 'register' : 'login';
  renderLoginModal('');
  setTimeout(() => {
    const el = document.getElementById('authUsername');
    if (el) el.focus();
  }, 50);
}

function closeLoginModal() {
  document.getElementById('modal-root').innerHTML = '';
}

function switchLoginTab(tab) {
  if (loginModalTab === tab) return;
  loginModalTab = tab;
  renderLoginModal('');
  setTimeout(() => {
    const el = document.getElementById('authUsername');
    if (el) el.focus();
  }, 0);
}

function renderLoginModal(errorMsg) {
  const isRegister = loginModalTab === 'register';
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeLoginModal()">
      <div class="modal">
        <div class="auth-tabs" role="tablist">
          <button class="auth-tab${!isRegister ? ' active' : ''}" onclick="switchLoginTab('login')">Войти</button>
          <button class="auth-tab${isRegister ? ' active' : ''}" onclick="switchLoginTab('register')">Регистрация</button>
        </div>
        <form class="auth-form" onsubmit="event.preventDefault();submitAuthForm()">
          <label>Имя пользователя</label>
          <input type="text" id="authUsername" autocomplete="username" autocapitalize="none" autocorrect="off">
          <label>Пароль</label>
          <input type="password" id="authPassword" autocomplete="${isRegister ? 'new-password' : 'current-password'}">
          ${isRegister ? `
            <label>Повторите пароль</label>
            <input type="password" id="authPassword2" autocomplete="new-password">
          ` : ''}
          ${errorMsg ? `<div class="auth-error">${escapeHtml(errorMsg)}</div>` : ''}
          <div class="modal-btns">
            <button type="button" class="cancel" onclick="closeLoginModal()">Отмена</button>
            <button type="submit" class="confirm">${isRegister ? 'Зарегистрироваться' : 'Войти'}</button>
          </div>
        </form>
      </div>
    </div>`;
}

async function submitAuthForm() {
  const usernameEl = document.getElementById('authUsername');
  const passwordEl = document.getElementById('authPassword');
  if (!usernameEl || !passwordEl) return;
  const username = usernameEl.value.trim();
  const password = passwordEl.value;
  if (!username || !password) {
    renderLoginModal('Введите имя пользователя и пароль');
    return;
  }
  if (loginModalTab === 'register') {
    const pw2El = document.getElementById('authPassword2');
    const password2 = pw2El ? pw2El.value : '';
    if (password !== password2) {
      renderLoginModal('Пароли не совпадают');
      return;
    }
    if (password.length < 6) {
      renderLoginModal('Пароль должен быть не короче 6 символов');
      return;
    }
    try {
      const { token, user } = await register(username, password);
      await handleAuthSuccess(token, user);
    } catch (e) {
      renderLoginModal(e.message || 'Не удалось зарегистрироваться');
    }
    return;
  }
  // Login tab
  try {
    const { token, user } = await login(username, password);
    await handleAuthSuccess(token, user);
  } catch (e) {
    renderLoginModal(e.message || 'Не удалось войти');
  }
}

async function login(username, password) {
  const res = await fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password })
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
  return data;
}

async function register(username, password) {
  const res = await fetch('/api/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password })
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
  return data;
}

async function handleAuthSuccess(token, user) {
  localStorage.setItem(LS_KEYS.token, token);
  localStorage.setItem(LS_KEYS.authUser, JSON.stringify(user));
  Storage.mode = 'api';
  Storage.token = token;
  currentUser = user;
  closeLoginModal();

  // Offer migration if local guest data exists
  const localTasks = Storage._getLocalTasks();
  if (localTasks.length > 0) {
    if (confirm('Перенести локальные задачи в аккаунт?')) {
      try { await migrateLocalToApi(); }
      catch (e) {
        console.error('Migration failed', e);
        alert('Миграция не удалась: ' + (e.message || e) + '\nОставляем локальные данные на месте.');
      }
    }
  }
  try { await loadAllData(); }
  catch (e) { console.error('Initial load after auth failed:', e); }
  render();
  renderAuthSection();
}

async function migrateLocalToApi() {
  const localTasks   = readJSON(LS_KEYS.tasks, []);
  const localChecked = readJSON(LS_KEYS.checked, {});
  const localCats    = readJSON(LS_KEYS.cats, null);

  const tasksToInsert = (localTasks || []).map(t => {
    const deadline = t.deadline || '—';
    return {
      text: t.text, tag: t.tag,
      deadline: deadline || null,
      deadline_date: isoFromRussian(deadline) || null,
      month: monthOf(deadline),
      urgent: !!(t.manualUrgent ?? t.urgent ?? false),
      done:   !!localChecked[t.id],
      archived: !!t.archived,
    };
  });

  const catsToInsert = Object.entries(localCats || {}).map(([key, v]) => ({
    key, label: v.label, color_id: v.colorId,
  }));

  if (catsToInsert.length)  await Storage.bulkInsertCategories(catsToInsert);
  if (tasksToInsert.length) await Storage.bulkInsertTasks(tasksToInsert);

  // Clear localStorage data keys (keep device prefs like display mode)
  localStorage.removeItem(LS_KEYS.tasks);
  localStorage.removeItem(LS_KEYS.checked);
  localStorage.removeItem(LS_KEYS.cats);
}

async function logout() {
  Storage.mode  = 'local';
  Storage.token = null;
  currentUser = null;
  localStorage.removeItem(LS_KEYS.authUser);
  localStorage.removeItem(LS_KEYS.token);
  filter = 'all';
  editingTaskId = null;
  categoryEditMode = false;
  editingCategoryKey = null;
  await loadAllData();
  render();
  renderAuthSection();
}

function markSync(ok) {
  syncErrorMessage = ok ? '' : 'Ошибка синхронизации';
  // Light-touch: only re-render header to avoid full re-render churn
  renderAuthSection();
}

// ============================================================
// ESCAPING
// ============================================================
function escapeHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function escapeAttr(s) { return escapeHtml(s); }

// ============================================================
// RENDERING
// ============================================================
function buildCategoryOptionsHtml(selectedKey) {
  let html = '';
  for (const [k, v] of Object.entries(categories)) {
    html += `<option value="${escapeAttr(k)}"${k === selectedKey ? ' selected' : ''}>${escapeHtml(v.label)}</option>`;
  }
  html += `<option value="${NEW_CAT_SENTINEL}">+ Новая категория</option>`;
  return html;
}

function populateAddTagSelect() {
  const sel = document.getElementById('newTag');
  const preserve = sel.value;
  sel.innerHTML = buildCategoryOptionsHtml(null);
  if (preserve && categories[preserve]) sel.value = preserve;
}

function renderAuthSection() {
  const el = document.getElementById('auth-section');
  if (Storage.mode === 'api' && currentUser) {
    const displayName = currentUser.username || 'User';
    const initial = displayName.trim().charAt(0).toUpperCase() || '?';
    el.innerHTML = `
      <div class="auth-user">
        <span class="auth-avatar fallback">${escapeHtml(initial)}</span>
        <span class="auth-name">${escapeHtml(displayName)}</span>
        <button class="auth-logout" onclick="logout()">Выйти</button>
      </div>
      ${syncErrorMessage ? `<span class="sync-badge error">${escapeHtml(syncErrorMessage)}</span>` : ''}`;
  } else {
    el.innerHTML = `<button class="auth-login-btn" onclick="showLoginModal()">Войти</button>`;
  }
}

function renderToolbar() {
  const all = getAllEffectiveTasks();
  const archiveCount = all.filter(t => isArchived(t)).length;
  const dmIcon  = displayMode === 'date' ? '📅' : '⏳';
  const dmLabel = displayMode === 'date' ? 'дата' : 'осталось дней';
  const dmNext  = displayMode === 'date' ? 'осталось дней' : 'дата';

  let html = '';
  if (archiveCount > 0) {
    html += `<button class="toolbar-btn archive${showArchive ? ' active' : ''}"
      onclick="toggleArchive()"
      title="${showArchive ? 'Скрыть архив' : 'Показать архив'}">
      <span>Архив (${archiveCount})</span>
    </button>`;
  }
  html += `<button class="toolbar-btn display" onclick="toggleDisplayMode()" title="Переключить на: ${dmNext}">
    <span class="tb-icon">${dmIcon}</span><span>${dmLabel}</span>
  </button>`;
  document.getElementById('toolbar').innerHTML = html;
}

function renderStats(scoped) {
  const total      = scoped.length;
  const done       = scoped.filter(t => checked[t.id]).length;
  const pct        = total ? Math.round(done / total * 100) : 0;
  const urgentLeft = scoped.filter(t => t._urgent && !checked[t.id]).length;
  const scopeLabel = filter === 'all' ? 'все направления' : (categories[filter] || {}).label || filter;
  const barHex     = filter === 'all' ? 'var(--accent)' : catColor(filter).hex;
  document.getElementById('stats').innerHTML = `
    <div class="stat">
      <div class="stat-label">Прогресс</div>
      <div class="stat-val">${pct}%</div>
      <div class="stat-bar"><div class="stat-bar-fill" style="width:${pct}%;background:${barHex}"></div></div>
      <div class="stat-scope">${escapeHtml(scopeLabel)}</div>
    </div>
    <div class="stat"><div class="stat-label">Всего</div><div class="stat-val">${total}</div></div>
    <div class="stat"><div class="stat-label">Готово</div><div class="stat-val" style="color:#12b76a">${done}</div></div>
    <div class="stat"><div class="stat-label">Срочно</div><div class="stat-val" style="color:${urgentLeft ? 'var(--urgent)' : 'var(--text-faint)'}">${urgentLeft}</div></div>
  `;
}

function renderFilters() {
  let html = '';
  if (!categoryEditMode) {
    html += `<button class="filter-btn${filter === 'all' ? ' active' : ''}" onclick="setFilter('all')">Все</button>`;
  }
  for (const [k, v] of Object.entries(categories)) {
    const c = getColor(v.colorId);
    if (categoryEditMode) {
      const isRenaming = editingCategoryKey === k;
      const nameContent = isRenaming
        ? `<input class="cat-rename-input" id="cat-rename-${escapeAttr(k)}"
              value="${escapeAttr(v.label)}"
              onclick="event.stopPropagation()"
              onkeydown="if(event.key==='Enter')saveCatRename('${escapeAttr(k)}');if(event.key==='Escape')cancelCatRename()"
              onblur="saveCatRename('${escapeAttr(k)}')">`
        : `<span class="cat-name" onclick="event.stopPropagation();startCatRename('${escapeAttr(k)}')">${escapeHtml(v.label)}</span>`;
      html += `<span class="filter-btn cat-editing">
        <span class="filter-dot" style="background:${c.hex}"></span>
        ${nameContent}
        <button class="cat-del" onclick="event.stopPropagation();confirmCatDelete('${escapeAttr(k)}')" title="Удалить категорию">×</button>
      </span>`;
    } else {
      html += `<button class="filter-btn${filter === k ? ' active' : ''}" onclick="setFilter('${escapeAttr(k)}')">
        <span class="filter-dot" style="background:${c.hex}"></span>${escapeHtml(v.label)}
      </button>`;
    }
  }
  if (!categoryEditMode) {
    html += `<button class="filter-btn add-cat-btn" onclick="showCatModal()">+ категория</button>`;
  }
  html += categoryEditMode
    ? `<button class="cat-edit-toggle active" onclick="toggleCategoryEditMode()">✓ Готово</button>`
    : `<button class="cat-edit-toggle" onclick="toggleCategoryEditMode()" title="Изменить категории">✎</button>`;
  document.getElementById('filters').innerHTML = html;
}

function renderTaskCard(t, isArchivedDisplay) {
  const isDone      = !!checked[t.id];
  const isEditing   = editingTaskId === t.id;
  const cat         = categories[t.tag];
  const c           = cat ? getColor(cat.colorId) : COLOR_PALETTE[0];
  const tagStyle    = `background:${c.bg};color:${c.hex};border:1px solid ${c.border}`;
  const showUrgent  = t._urgent && !isDone && !isArchivedDisplay;
  const showOverdue = !isArchivedDisplay && isOverdue(t);

  if (isEditing) {
    const iso       = isoFromRussian(t.deadline);
    const hasReal   = !!t.deadline && t.deadline !== '—';
    const dispText  = iso ? russianFromIso(iso) : (hasReal ? t.deadline : 'Дедлайн');
    const dispEmpty = !iso && !hasReal;
    const archiveBtn = t.archived
      ? `<button class="btn-edit-unarchive" onclick="unarchiveTask('${escapeAttr(t.id)}')">Восстановить</button>`
      : `<button class="btn-edit-archive" onclick="archiveTask('${escapeAttr(t.id)}')">В архив</button>`;
    return `<div class="task editing" data-id="${escapeAttr(t.id)}">
      <div class="task-edit-form" onclick="event.stopPropagation()">
        <input class="edit-field" id="te-text-${escapeAttr(t.id)}" type="text" value="${escapeAttr(t.text)}" placeholder="Задача"
               onkeydown="if(event.key==='Enter')saveTaskEdit('${escapeAttr(t.id)}');if(event.key==='Escape')cancelTaskEdit()">
        <div class="edit-row">
          <div class="date-picker" id="te-deadline-wrap-${escapeAttr(t.id)}" data-original="${escapeAttr(t.deadline || '')}">
            <span class="date-display${dispEmpty ? ' empty' : ''}" id="te-deadline-disp-${escapeAttr(t.id)}">${escapeHtml(dispText)}</span>
            <svg class="date-cal-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <input type="date" class="date-native" id="te-deadline-native-${escapeAttr(t.id)}" value="${iso}" onchange="onEditDateChange('${escapeAttr(t.id)}')">
          </div>
          <select class="edit-field" id="te-tag-${escapeAttr(t.id)}"
                  onmousedown="this.dataset.prev=this.value" onchange="onEditTagChange('${escapeAttr(t.id)}')">
            ${buildCategoryOptionsHtml(t.tag)}
          </select>
        </div>
        <label class="edit-urgent">
          <input type="checkbox" id="te-urgent-${escapeAttr(t.id)}"${t.manualUrgent ? ' checked' : ''}>
          Срочно (вручную)
        </label>
        <div class="edit-actions">
          <button class="btn-edit-save" onclick="saveTaskEdit('${escapeAttr(t.id)}')">Сохранить</button>
          ${archiveBtn}
          <button class="btn-edit-delete" onclick="confirmDeleteTask('${escapeAttr(t.id)}')">Удалить</button>
        </div>
      </div>
    </div>`;
  }

  const cls = [
    'task',
    isDone ? 'done' : '',
    showUrgent ? 'urgent' : '',
    showOverdue ? 'overdue' : '',
    isArchivedDisplay ? 'archived' : '',
  ].filter(Boolean).join(' ');

  return `<div class="${cls}" onclick="toggle('${escapeAttr(t.id)}')">
    <div class="checkbox">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6.5L4.5 9L10 3" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="task-body">
      <div class="task-text">${escapeHtml(t.text)}</div>
      <div class="task-row">
        <span class="tag" style="${tagStyle}">${escapeHtml(cat ? cat.label : t.tag)}</span>
        ${showUrgent ? '<span class="tag tag-urgent">срочно</span>' : ''}
        <span class="deadline${showOverdue ? ' overdue-label' : ''}">${escapeHtml(formatDeadline(t.deadline))}</span>
      </div>
    </div>
    <button class="task-edit-trigger" onclick="event.stopPropagation();startTaskEdit('${escapeAttr(t.id)}')" title="Редактировать">✎</button>
  </div>`;
}

function renderTasks(scopedActive, scopedArchived) {
  let html = '';
  if (scopedActive.length) {
    const monthsMap = new Map();
    scopedActive.forEach(t => {
      const m = monthOf(t.deadline);
      if (!monthsMap.has(m)) monthsMap.set(m, []);
      monthsMap.get(m).push(t);
    });
    const sortedMonths = [...monthsMap.keys()].sort((a, b) => monthSortKey(a) - monthSortKey(b));
    sortedMonths.forEach(m => {
      const group = monthsMap.get(m);
      group.sort((a, b) => taskDateSortKey(a) - taskDateSortKey(b));
      const doneM = group.filter(t => checked[t.id]).length;
      html += `<div class="month-group">
        <div class="month-header"><span>${escapeHtml(m)}</span><span>${doneM}/${group.length}</span></div>`;
      group.forEach(t => { html += renderTaskCard(t, false); });
      html += '</div>';
    });
  } else {
    html += `<div class="empty-state">Нет задач в этой категории</div>`;
  }
  if (showArchive && scopedArchived.length) {
    // Same chronological order as the active list: nearest deadline first,
    // unparseable deadlines last.
    const sorted = scopedArchived.slice().sort((a, b) => taskDateSortKey(a) - taskDateSortKey(b));
    html += `<div class="archive-section">
      <div class="archive-header"><span>Архив</span><span>${sorted.length}</span></div>`;
    sorted.forEach(t => { html += renderTaskCard(t, true); });
    html += `</div>`;
  }
  document.getElementById('tasks').innerHTML = html;
}

function render() {
  populateAddTagSelect();
  renderAuthSection();
  renderToolbar();

  const all = getAllEffectiveTasks().map(t => ({
    ...t,
    _urgent: t.manualUrgent || isAutoUrgent(t.deadline),
  }));
  const archivable = all.filter(t => isArchived(t));
  const active     = all.filter(t => !isArchived(t));

  const scopedActive   = filter === 'all' ? active     : active.filter(t => t.tag === filter);
  const scopedArchived = filter === 'all' ? archivable : archivable.filter(t => t.tag === filter);

  renderStats(scopedActive);
  renderFilters();
  renderTasks(scopedActive, scopedArchived);

  if (editingTaskId != null) {
    const el = document.getElementById('te-text-' + editingTaskId);
    if (el && document.activeElement !== el) el.focus();
  }
  if (editingCategoryKey != null) {
    const el = document.getElementById('cat-rename-' + editingCategoryKey);
    if (el && document.activeElement !== el) { el.focus(); el.select(); }
  }
}

// ============================================================
// GLOBAL DISMISS HANDLERS
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Escape') return;
  if (editingTaskId != null)      { cancelTaskEdit(); return; }
  if (editingCategoryKey != null) { cancelCatRename(); return; }
  if (categoryEditMode)           { toggleCategoryEditMode(); }
});
document.addEventListener('click', (e) => {
  if (editingTaskId == null) return;
  const inForm    = e.target.closest('.task-edit-form');
  const onTrigger = e.target.closest('.task-edit-trigger');
  const inModal   = e.target.closest('.modal-overlay');
  if (!inForm && !onTrigger && !inModal) cancelTaskEdit();
});

// ============================================================
// INIT — restore saved auth from localStorage, then load data
// ============================================================
async function init() {
  // Restore saved auth (token + user) if any. If the token turns out
  // to be invalid we fall back to local/guest mode below.
  const storedToken = localStorage.getItem(LS_KEYS.token);
  const storedUser  = localStorage.getItem(LS_KEYS.authUser);
  if (storedToken && storedUser) {
    try {
      const u = JSON.parse(storedUser);
      if (u && u.id) {
        currentUser   = u;
        Storage.mode  = 'api';
        Storage.token = storedToken;
      }
    } catch (e) { /* ignore */ }
  }

  // 3. Load data and render. If the API rejects us (expired token), fall
  //    back to local/guest mode so the app stays usable.
  try {
    await loadAllData();
  } catch (e) {
    console.error('loadAllData failed (forcing local mode):', e);
    if (e && e.unauthorized) {
      localStorage.removeItem(LS_KEYS.token);
      localStorage.removeItem(LS_KEYS.authUser);
    }
    Storage.mode  = 'local';
    Storage.token = null;
    currentUser = null;
    try { await loadAllData(); } catch (e2) { console.error('local load also failed:', e2); }
  }
  render();
  renderAuthSection();
}

init().catch(e => {
  console.error('init() crashed:', e);
  // Last-resort recovery: render an empty UI so the page is never blank.
  try {
    categories = {};
    customTasks = [];
    checked = {};
    render();
    renderAuthSection();
  } catch (e2) {
    console.error('Last-resort render also failed:', e2);
  }
});
</script>
